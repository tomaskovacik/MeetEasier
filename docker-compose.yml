services:
  meeteasier:
    image: ghcr.io/tomaskovacik/meeteasier:${IMAGE_TAG:-v1.5-bw-joan6}
    # Uncomment to build locally instead of pulling the GHCR image above:
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    # Uncomment to override the default logo without rebuilding the image -
    # static/ is served straight from disk at runtime, so this takes effect
    # immediately:
    # volumes:
    #   - ./my-logo.png:/app/static/img/logo.png:ro
    env_file:
      - .env
    environment:
      # Fixed internal port: the app must always listen on the same port
      # the container exposes, regardless of any PORT set in .env (which
      # may target a different value for non-Docker/bare-metal use).
      # Change the host-facing port via HOST_PORT instead.
      - PORT=8080
    restart: unless-stopped
